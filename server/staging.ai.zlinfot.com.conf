# Staging configuration for ai.zlinfot.com portal + backend
server {
    listen 80;
    listen [::]:80;
    server_name staging.ai.zlinfot.com;

    root /opt/zlinfot-ai/current/site;
    index index.html;

    access_log /var/log/nginx/staging.ai.zlinfot.com.access.log;
    error_log  /var/log/nginx/staging.ai.zlinfot.com.error.log warn;

    # Backend API proxy (no trailing slash handling here, the app expects /api/*)
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 60s;
    }

    # Admin UI: protected with Basic Auth in production/staging.
    location /admin {
        try_files $uri $uri/ /index.html;
        auth_basic "Admin";
        auth_basic_user_file /opt/zlinfot-ai/backend/.htpasswd;
    }

    location = /index.html {
        try_files $uri =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ /\. {
        deny all;
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' http://staging.ai.zlinfot.com" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
