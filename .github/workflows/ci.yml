name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest httpx
        working-directory: backend

      - name: Run backend tests
        run: DATABASE_URL=sqlite:///./test.db python -m pytest -q
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Validate content
        run: python3 scripts/validate-content.py

      - name: Test deployment scripts
        run: bash tests/deploy-scripts.sh

      - name: Package release
        run: bash scripts/package.sh

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: process-industry-ai-${{ github.sha }}
          path: |
            process-industry-ai-*.tar.gz
            process-industry-ai-*.tar.gz.sha256
          retention-days: 30
