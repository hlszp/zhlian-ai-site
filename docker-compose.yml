services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: zlai
      POSTGRES_USER: zlai
      POSTGRES_PASSWORD: zlai
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zlai -d zlai"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://zlai:zlai@db:5432/zlai
      ENVIRONMENT: development
      CORS_ORIGINS: http://localhost:5173,http://localhost:80
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
    ports:
      - "5173:5173"

  nginx:
    image: nginx:alpine
    volumes:
      - ./server/staging.ai.zlinfot.com.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
